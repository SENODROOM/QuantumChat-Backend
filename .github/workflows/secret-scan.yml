name: Secret Scan

# Uses the open-source Gitleaks CLI (no org license required).
# The gitleaks-action GitHub Action requires GITLEAKS_LICENSE on organization repos.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: '8.30.1'
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact --exit-code 1 --config .gitleaks.toml
