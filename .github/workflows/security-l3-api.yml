name: L3 API Vuln Detection

on:
  push:
  pull_request:

jobs:
  api-vuln-detection:
    name: API Vuln Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache MongoDB test binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-7.0.24-${{ runner.os }}

      - name: Install dependencies
        run: npm ci

      - name: Run API vulnerability detection lane
        run: npm run test:security:api
