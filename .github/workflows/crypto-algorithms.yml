name: Crypto Algorithms

on:
  push:
  pull_request:

jobs:
  crypto-algorithms:
    name: Crypto Algorithms
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run offline crypto + randomness + input hardening
        run: |
          node --test --test-concurrency=1 \
            test/security/randomness-integrity.test.js \
            test/security/crypto-algorithms.test.js \
            test/security/input-hardening.test.js
