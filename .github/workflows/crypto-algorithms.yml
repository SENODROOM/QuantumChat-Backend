name: Crypto Algorithms

on:
  push:
  pull_request:

jobs:
  crypto:
    name: Crypto Algorithms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node --test test/security/randomness-integrity.test.js test/security/crypto-algorithms.test.js test/security/input-hardening.test.js
